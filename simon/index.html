<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simon Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Simon</h1>
      <div class="status">
        <h2 id="level">Press Start to Play</h2>
        <button id="start">Start</button>
      </div>
    </div>

    <div id="container">
      <div class="grid">
        <button class="btn red" id="red" type="button"></button>
        <button class="btn yellow" id="yellow" type="button"></button>
        <button class="btn green" id="green" type="button"></button>
        <button class="btn purple" id="purple" type="button"></button>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
